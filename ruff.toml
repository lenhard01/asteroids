line-length = 79

[lint]
select = [
    "A","ANN","ASYNC","B","C4","E","W","F","I","ICN", "PERF", "G",
    "ISC","N","NPY","PT","PTH","RET","S","SIM","TC","TID","UP","RUF"
]

ignore = [
    "E501",
    "ANN101",
    "ANN102",
    "ANN401",
    "ISC001",
]

[lint.per-file-ignores]
"asteroidfield.py" = ["S311"]
"asteroid.py" = ["S311"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
